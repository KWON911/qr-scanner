<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>QR 스캐너</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --accent: #00d4aa;
      --accent2: #0096ff;
      --text: #f0f4ff;
      --muted: #7a8aaa;
      --danger: #ff4d6d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* 헤더 */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px 14px;
      position: relative;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    .status-dot.off {
      background: var(--muted);
      box-shadow: none;
      animation: none;
    }
    .save-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    .save-btn:active { opacity: 0.8; }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 뷰파인더 영역 */
    .viewfinder-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      position: relative;
      min-height: 0;
    }

    .viewfinder {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
    }

    video, canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    canvas { display: none; }

    /* 스캔 코너 프레임 */
    .frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .corner {
      position: absolute;
      width: 36px; height: 36px;
      border-color: var(--accent);
      border-style: solid;
    }
    .corner.tl { top: 16px; left: 16px; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top: 16px; right: 16px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    /* 스캔 라인 */
    .scan-line {
      position: absolute;
      left: 18px; right: 18px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 10px var(--accent);
      top: 18px;
      animation: scan 2.4s ease-in-out infinite;
      z-index: 11;
    }
    @keyframes scan {
      0%   { top: 18px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 20px); opacity: 0; }
    }
    .scan-line.paused { animation-play-state: paused; display: none; }

    /* 성공 오버레이 */
    .success-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 212, 170, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 20px;
    }
    .success-overlay.show { opacity: 1; }
    .check-icon {
      font-size: 64px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    /* 힌트 텍스트 */
    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
      padding: 10px 20px 4px;
      flex-shrink: 0;
    }

    /* 버튼 영역 */
    .controls {
      padding: 12px 20px 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      max-width: 200px;
      padding: 14px 10px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.96); }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-stop {
      background: var(--surface);
      color: var(--muted);
      border: 1.5px solid #2a3448;
    }

    /* ===== 팝업 ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      padding: 0 0 env(safe-area-inset-bottom);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .popup {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 560px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .overlay.open .popup {
      transform: translateY(0);
    }

    .popup-handle {
      width: 40px; height: 4px;
      background: #2a3448;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .popup-icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 10px;
    }

    .popup-title {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .popup-url {
      background: #0d1628;
      border: 1.5px solid #1e2d48;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.92rem;
      color: var(--accent2);
      word-break: break-all;
      line-height: 1.5;
      margin-bottom: 20px;
      text-align: center;
    }

    .popup-actions {
      display: flex;
      gap: 10px;
    }

    .popup-btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .popup-btn:active { transform: scale(0.96); }

    .popup-btn-open {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .popup-btn-copy {
      background: #1a2540;
      color: var(--text);
      border: 1.5px solid #2a3a5a;
    }
    .popup-btn-close {
      background: #1a2540;
      color: var(--muted);
      border: 1.5px solid #2a3a5a;
      flex: 0 0 auto;
      padding: 14px 18px;
    }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e2d48;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 30px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      white-space: nowrap;
      border: 1px solid #2a3a5a;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 에러 */
    .error-box {
      background: rgba(255,77,109,0.12);
      border: 1.5px solid rgba(255,77,109,0.3);
      border-radius: 12px;
      color: var(--danger);
      font-size: 0.82rem;
      text-align: center;
      padding: 10px 16px;
      margin: 0 20px;
      display: none;
    }
    .error-box.show { display: block; }

    /* 시작 전 안내 */
    .idle-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      background: #050a14;
      z-index: 5;
      border-radius: 20px;
    }
    .idle-msg .big { font-size: 2.8rem; }
    .idle-msg.hide { display: none; }
  </style>
</head>
<body>

<header>
  <div class="status-dot off" id="statusDot"></div>
  <h1>QR 스캐너</h1>
  <button class="save-btn" onclick="saveFile()">💾 저장</button>
</header>

<div class="viewfinder-wrap">
  <div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div class="scan-line paused" id="scanLine"></div>
    <div class="success-overlay" id="successOverlay">
      <div class="check-icon">✅</div>
    </div>

    <div class="idle-msg" id="idleMsg">
      <div class="big">📷</div>
      <div>아래 버튼을 눌러 시작하세요</div>
    </div>
  </div>
</div>

<p class="hint" id="hint">QR코드를 화면 안에 맞춰 주세요</p>
<div class="error-box" id="errorBox"></div>

<div class="controls">
  <button class="btn btn-start" id="btnStart" onclick="startScan()">📷 스캔 시작</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopScan()" style="display:none">⏹ 중지</button>
</div>

<!-- 팝업 -->
<div class="overlay" id="overlay" onclick="closePopupByBg(event)">
  <div class="popup">
    <div class="popup-handle"></div>
    <div class="popup-icon">🔗</div>
    <div class="popup-title">QR 코드 인식됨</div>
    <div class="popup-url" id="popupUrl"></div>
    <div class="popup-actions">
      <button class="popup-btn popup-btn-open" id="btnOpen" onclick="openLink()">🌐 열기</button>
      <button class="popup-btn popup-btn-copy" onclick="copyLink()">📋 복사</button>
      <button class="popup-btn popup-btn-close" onclick="closePopup()">✕</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  let stream = null;
  let scanning = false;
  let lastResult = null;
  let rafId = null;
  let cooldown = false;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const overlay = document.getElementById('overlay');
  const popupUrl = document.getElementById('popupUrl');
  const scanLine = document.getElementById('scanLine');
  const statusDot = document.getElementById('statusDot');
  const idleMsg = document.getElementById('idleMsg');
  const errorBox = document.getElementById('errorBox');
  const hint = document.getElementById('hint');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const successOverlay = document.getElementById('successOverlay');
  const btnOpen = document.getElementById('btnOpen');

  function saveFile() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'QR스캐너.html';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('QR스캐너.html 저장됨 ✓');
  }

  async function startScan() {
    errorBox.classList.remove('show');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 1280 }
        }
      });
      video.srcObject = stream;
      video.play();
      scanning = true;
      idleMsg.classList.add('hide');
      scanLine.classList.remove('paused');
      statusDot.classList.remove('off');
      btnStart.style.display = 'none';
      btnStop.style.display = '';
      hint.textContent = 'QR코드를 화면 안에 맞춰 주세요';
      tick();
    } catch (e) {
      showError('카메라 접근 권한이 필요합니다.\n브라우저 설정에서 카메라 권한을 허용해 주세요.');
    }
  }

  function stopScan() {
    scanning = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    scanLine.classList.add('paused');
    statusDot.classList.add('off');
    idleMsg.classList.remove('hide');
    btnStart.style.display = '';
    btnStop.style.display = 'none';
    hint.textContent = 'QR코드를 화면 안에 맞춰 주세요';
  }

  function tick() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA && !cooldown) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      if (code && code.data && code.data !== lastResult) {
        lastResult = code.data;
        onDetected(code.data);
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  function onDetected(data) {
    cooldown = true;
    successOverlay.classList.add('show');
    // 진동
    if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
    setTimeout(() => {
      successOverlay.classList.remove('show');
      showPopup(data);
      cooldown = false;
    }, 700);
  }

  function showPopup(data) {
    popupUrl.textContent = data;
    // URL인지 판별
    const isUrl = /^https?:\/\//i.test(data) || /^www\./i.test(data);
    btnOpen.style.display = isUrl ? '' : 'none';
    overlay.classList.add('open');
    lastResult = data;
  }

  function closePopup() {
    overlay.classList.remove('open');
    lastResult = null;
  }

  function closePopupByBg(e) {
    if (e.target === overlay) closePopup();
  }

  function openLink() {
    let url = popupUrl.textContent.trim();
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    window.open(url, '_blank');
  }

  function copyLink() {
    const text = popupUrl.textContent.trim();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사되었습니다 ✓'));
    } else {
      // 폴백
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('클립보드에 복사되었습니다 ✓');
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }
</script>
</body>
</html>
